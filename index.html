<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* OKだったデザインを完全に復元 */
    :root {
      --main-green: #27ae60; --sat-blue: #2980b9; --sun-red: #d35400;
      --bg-light: #f4f7f8; --my-row-bg: #fffbe6; --name-col-width: 70px;
    }
    body { font-family: sans-serif; margin: 0; background: var(--bg-light); color: #333; overflow: hidden; }
    .container { padding: 4px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    h3 { text-align: center; font-size: 18px; margin: 6px 0; }
    .table-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; border-radius: 8px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    thead { position: sticky; top: 0; z-index: 10; }
    th { background: var(--main-green); color: white; padding: 4px 0; font-size: 12px; border: none; font-weight: bold; }
    .name-col-head { width: var(--name-col-width); }
    th.sat { background: var(--sat-blue); } 
    th.sun { background: var(--sun-red); } 
    .count-box { font-size: 10px; margin-top: 3px; padding: 2px 4px; background: rgba(0,0,0,0.15); font-weight: normal; line-height: 1.3; }
    .count-row { display: flex; justify-content: space-between; }
    .count-num { font-weight: bold; font-family: monospace; }
    td { border-bottom: 1px solid #eee; height: 48px; text-align: center; }
    .name-cell { width: var(--name-col-width); padding: 0 2px; font-weight: bold; font-size: 12px; text-align: left; background: #fafafa; border-right: 2px solid var(--main-green); word-break: break-all; }
    .my-row { background-color: var(--my-row-bg) !important; }
    .status-cell { font-size: 24px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .view-mode .status-cell { cursor: default; } 
    .status-〇 { color: var(--main-green); font-weight: bold; } 
    .status-△ { color: #f39c12; font-weight: bold; }
    .status-× { color: #7f8c8d; font-weight: bold; }
    .status-- { color: #ccc; }
    
    /* ロード中表示 */
    #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid var(--main-green); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; display: none; z-index: 1000; }
    #registration-view { display: none; padding: 20px; text-align: center; background: white; border-radius: 8px; margin: 20px; }
    select { width: 100%; padding: 10px; margin: 15px 0; font-size: 16px; }
    .btn-link { background: var(--main-green); color: white; border: none; padding: 12px 20px; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body id="bodyTag">
  <div id="loading"><div class="spinner"></div><p>読込中...</p></div>

  <div id="registration-view">
    <h3>初回登録</h3>
    <select id="name-list"></select>
    <button class="btn-link" onclick="link()">登録する</button>
  </div>

  <div class="container" id="main-view" style="display:none;">
    <h3 id="weekTitle"></h3>
    <div class="table-wrapper"><table id="mainTable"></table></div>
  </div>
  <div id="toast"></div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycby9ykJ5pFhp7rSh0_zS3kuzWukA69vZou-XARlhdyG4Cjt_qPls5ULajekYXZj1vvZV/exec"; // ★要更新
  const LIFF_ID = "2009266487-GEiMe9Ei";

  let MY_LINE_ID = "";
  let IS_VIEW_MODE = false;
  let days = [];
  let rawData = [];
  const UI_CONFIG = {
    signs: ["〇", "△", "×", "-"],
    labels: { "〇": "参加", "△": "遅参", "×": "欠席", "-": "未回答" }
  };

  function getAntiCacheKey() { return `v=${new Date().getTime()}_${Math.random().toString(36).substring(2, 7)}`; }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    IS_VIEW_MODE = params.get('mode') === 'view';
    if (IS_VIEW_MODE) document.getElementById("bodyTag").classList.add("view-mode");

    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      MY_LINE_ID = profile.userId;

      const res = await fetch(`${GAS_URL}?uid=${MY_LINE_ID}&action=get&${getAntiCacheKey()}`, { cache: "no-cache" });
      const data = await res.json();

      if (data.status === "success") {
        days = data.data.dates;
        const families = data.data.families;
        document.getElementById("main-view").style.display = "flex";
        document.getElementById("weekTitle").innerText = data.data.weekLabel + (IS_VIEW_MODE ? " (閲覧用)" : "");

        if (IS_VIEW_MODE) {
          rawData = families;
        } else {
          const myData = families.find(f => f.lineId === MY_LINE_ID);
          const otherData = families.filter(f => f.lineId !== MY_LINE_ID);
          rawData = myData ? [myData, ...otherData] : families;
        }
        render();
      } else if (data.status === "unregistered") {
        document.getElementById("registration-view").style.display = "block";
        const select = document.getElementById("name-list");
        data.list.forEach(item => {
          let opt = document.createElement("option"); opt.value = item.id; opt.text = item.name; select.appendChild(opt);
        });
      }
    } catch (e) { alert("Error: " + e.message); }
    finally { document.getElementById("loading").style.display = "none"; }
  }

  function render() {
    if (!days || days.length === 0) return;
    const totals = days.map(() => {
      let obj = {}; UI_CONFIG.signs.forEach(s => obj[s] = 0); return obj;
    });
    rawData.forEach(f => {
      f.statuses.forEach((s, i) => { if (totals[i].hasOwnProperty(s)) totals[i][s]++; });
    });

    let html = `<thead><tr><th class="name-col-head">団員父兄</th>`;
    days.forEach((d, i) => {
      let cls = (d.includes("日") || d.includes("祝")) ? "sun" : d.includes("土") ? "sat" : "";
      let countHtml = `<div class="count-box">`;
      UI_CONFIG.signs.forEach(s => {
        countHtml += `<div class="count-row"><span>${s}${UI_CONFIG.labels[s]}</span><span class="count-num">${totals[i][s]}</span></div>`;
      });
      html += `<th class="${cls}">${d}${countHtml}</div></th>`;
    });
    html += "</tr></thead><tbody>";

    rawData.forEach((f, fIdx) => {
      const isMe = (f.lineId === MY_LINE_ID);
      html += `<tr class="${isMe ? 'my-row' : ''}"><td class="name-cell">${f.name}</td>`;
      f.statuses.forEach((s, dIdx) => {
        // ★ 閲覧モードではない、かつ自分の行である場合のみクリックを許可
        const canEdit = !IS_VIEW_MODE && isMe;
        const clickAttr = canEdit ? `onclick="toggle(${fIdx},${dIdx})"` : "";
        html += `<td class="status-cell status-${s}" ${clickAttr}>${s}</td>`;
      });
      html += "</tr>";
    });
    document.getElementById("mainTable").innerHTML = html + "</tbody>";
  }

  async function toggle(fIdx, dIdx) {
    const next = UI_CONFIG.signs[(UI_CONFIG.signs.indexOf(rawData[fIdx].statuses[dIdx]) + 1) % UI_CONFIG.signs.length];
    rawData[fIdx].statuses[dIdx] = next;
    render();
    showToast("更新中...");
    try {
      await fetch(`${GAS_URL}?uid=${MY_LINE_ID}&action=update&familyId=${rawData[fIdx].id}&dateLabel=${encodeURIComponent(days[dIdx])}&status=${encodeURIComponent(next)}&${getAntiCacheKey()}`);
      showToast("更新完了");
    } catch (e) { showToast("通信エラー"); }
  }

  async function link() {
    const sid = document.getElementById("name-list").value;
    document.getElementById("loading").style.display = "flex";
    try {
      await fetch(`${GAS_URL}?uid=${MY_LINE_ID}&action=link&family_id=${sid}&${getAntiCacheKey()}`);
      window.location.href = window.location.origin + window.location.pathname + "?t=" + new Date().getTime();
    } catch (e) { alert("Error"); document.getElementById("loading").style.display = "none"; }
  }

  function showToast(m) { const t=document.getElementById("toast"); t.innerText=m; t.style.display="block"; setTimeout(()=>t.style.display="none",1000); }
  window.onload = init;
</script>
</body>
</html>
