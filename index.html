<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --main-green: #27ae60; --sat-blue: #2980b9; --sun-red: #d35400;
      --bg-light: #f4f7f8; --my-row-bg: #fffbe6; --name-col-width: 70px;
    }
    body { font-family: sans-serif; margin: 0; background: var(--bg-light); color: #333; overflow: hidden; }
    .container { padding: 4px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    h3 { text-align: center; font-size: 18px; margin: 6px 0; }
    .table-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; border-radius: 8px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 60px; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    thead { position: sticky; top: 0; z-index: 10; }
    th { background: var(--main-green); color: white; padding: 4px 0; font-size: 12px; border: none; font-weight: bold; }
    .name-col-head { width: var(--name-col-width); }
    th.sat { background: var(--sat-blue); } 
    th.sun { background: var(--sun-red); } 
    .count-box { font-size: 10px; margin-top: 3px; padding: 2px 4px; background: rgba(0,0,0,0.15); font-weight: normal; line-height: 1.3; }
    .count-row { display: flex; justify-content: space-between; }
    .count-num { font-weight: bold; font-family: monospace; }
    td { border-bottom: 1px solid #eee; height: 48px; text-align: center; }
    .name-cell { width: var(--name-col-width); padding: 0 2px; font-weight: bold; font-size: 12px; text-align: left; background: #fafafa; border-right: 2px solid var(--main-green); word-break: break-all; }
    .my-row { background-color: var(--my-row-bg) !important; }
    .status-cell { font-size: 24px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .view-mode .status-cell { cursor: default; } 
    .status-〇 { color: var(--main-green); font-weight: bold; } 
    .status-△ { color: #f39c12; font-weight: bold; }
    .status-× { color: #7f8c8d; font-weight: bold; }
    .status-- { color: #ccc; }
    
    .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px; background: white; border-top: 1px solid #ddd; display: none; box-sizing: border-box; z-index: 100; }
    .btn-save { width: 100%; background: var(--main-green); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; }

    /* 初期状態で表示。JSが成功したら隠す */
    #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid var(--main-green); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #registration-view { display: none; padding: 20px; text-align: center; }
    select { width: 100%; padding: 10px; margin: 15px 0; font-size: 16px; }
  </style>
</head>
<body id="bodyTag">
  <div id="loading">
    <div class="spinner"></div>
    <p id="loadingText">読込中...</p>
  </div>

  <div id="registration-view">
    <h3>初回登録</h3>
    <select id="name-list"></select>
    <button class="btn-save" style="background:#27ae60;" onclick="link()">登録する</button>
  </div>

  <div class="container" id="main-view" style="display:none;">
    <h3 id="weekTitle"></h3>
    <div class="table-wrapper"><table id="mainTable"></table></div>
    <div id="footer" class="footer-bar">
      <button class="btn-save" onclick="saveAll()">変更を保存して閉じる</button>
    </div>
  </div>

<script>
  // ★ ここを自分のものに書き換えてください ★
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwtyh1X3-Q1ER93O4tjoW5Xi7qtiQe6QlrXDRD8iZMK8VNL-vHnccel0QGnrM-xJ1RC/exec"; 
  const LIFF_ID = "https://liff.line.me/2009266487-GEiMe9Ei";

  let MY_LINE_ID = "";
  let IS_VIEW_MODE = false;
  let days = [];
  let rawData = [];
  let changed = false;
  const UI_CONFIG = {
    signs: ["〇", "△", "×", "-"],
    labels: { "〇": "参加", "△": "遅参", "×": "欠席", "-": "未回答" }
  };

  async function init() {
    console.log("App Init Start");
    const params = new URLSearchParams(window.location.search);
    IS_VIEW_MODE = params.get('mode') === 'view';
    if (IS_VIEW_MODE) document.getElementById("bodyTag").classList.add("view-mode");

    try {
      // 1. LIFF初期化
      if (!LIFF_ID || LIFF_ID === "YOUR_LIFF_ID_HERE") {
        throw new Error("LIFF_IDが設定されていません。");
      }
      await liff.init({ liffId: LIFF_ID });

      // 2. ログインチェック
      if (!IS_VIEW_MODE) {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        MY_LINE_ID = profile.userId;
      }

      // 3. データ取得
      await fetchData();

    } catch (e) {
      console.error(e);
      alert("初期化エラー: " + e.message);
      document.getElementById("loadingText").innerText = "エラーが発生しました。";
    } finally {
      // 成功時のみフェードアウト
      if (rawData.length > 0 || IS_VIEW_MODE) {
         document.getElementById("loading").style.display = "none";
      }
    }
  }

  async function fetchData() {
    if (!GAS_URL || GAS_URL === "YOUR_GAS_URL_HERE") {
      throw new Error("GAS_URLが設定されていません。");
    }
    const res = await fetch(`${GAS_URL}?uid=${MY_LINE_ID}&action=get&mode=${IS_VIEW_MODE?'view':''}&v=${Date.now()}`);
    const data = await res.json();

    if (data.status === "success") {
      days = data.data.dates;
      rawData = data.data.families;
      document.getElementById("main-view").style.display = "flex";
      document.getElementById("weekTitle").innerText = data.data.weekLabel + (IS_VIEW_MODE ? " (閲覧用)" : "");
      if(!IS_VIEW_MODE) document.getElementById("footer").style.display = "block";
      render();
    } else if (data.status === "unregistered") {
      document.getElementById("loading").style.display = "none";
      document.getElementById("registration-view").style.display = "block";
      const select = document.getElementById("name-list");
      data.list.forEach(item => {
        let opt = document.createElement("option"); opt.value = item.id; opt.text = item.name; select.appendChild(opt);
      });
    } else {
      throw new Error(data.message || "データ取得に失敗しました。");
    }
  }

  function render() {
    if (!days || days.length === 0) return;
    const totals = days.map(() => {
      let obj = {}; UI_CONFIG.signs.forEach(s => obj[s] = 0); return obj;
    });
    rawData.forEach(f => {
      f.statuses.forEach((s, i) => { if (totals[i].hasOwnProperty(s)) totals[i][s]++; });
    });

    let html = `<thead><tr><th class="name-col-head">団員父兄</th>`;
    days.forEach((d, i) => {
      let cls = (d.includes("日") || d.includes("祝")) ? "sun" : d.includes("土") ? "sat" : "";
      html += `<th class="${cls}">${d}<div class="count-box">`;
      UI_CONFIG.signs.forEach(s => {
        html += `<div class="count-row"><span>${s}${UI_CONFIG.labels[s]}</span><span class="count-num">${totals[i][s]}</span></div>`;
      });
      html += `</div></th>`;
    });
    html += "</tr></thead><tbody>";

    rawData.forEach((f, fIdx) => {
      const isMe = (MY_LINE_ID && f.lineId === MY_LINE_ID);
      html += `<tr class="${isMe ? 'my-row' : ''}"><td class="name-cell">${f.name}</td>`;
      f.statuses.forEach((s, dIdx) => {
        const canEdit = !IS_VIEW_MODE && isMe;
        const clickAttr = canEdit ? `onclick="toggle(${fIdx},${dIdx})"` : "";
        html += `<td class="status-cell status-${s}" ${clickAttr}>${s}</td>`;
      });
      html += "</tr>";
    });
    document.getElementById("mainTable").innerHTML = html + "</tbody>";
  }

  function toggle(fIdx, dIdx) {
    const signs = UI_CONFIG.signs;
    const current = rawData[fIdx].statuses[dIdx];
    rawData[fIdx].statuses[dIdx] = signs[(signs.indexOf(current) + 1) % signs.length];
    changed = true;
    render();
  }

  async function saveAll() {
    if (!changed) { liff.closeWindow(); return; }

    const loader = document.getElementById("loading");
    const loaderText = document.getElementById("loadingText");
    loader.style.display = "flex";
    loaderText.innerText = "保存中...";

    const myData = rawData.find(f => f.lineId === MY_LINE_ID);
    const payload = myData.statuses.map((s, i) => ({
      familyId: myData.id,
      dateLabel: days[i],
      status: s
    }));

    try {
      const res = await fetch(`${GAS_URL}?action=update_all&payload=${encodeURIComponent(JSON.stringify(payload))}`);
      const resData = await res.json();
      if (resData.status === "success") {
        loaderText.innerText = "保存完了！";
        setTimeout(() => { liff.closeWindow(); }, 800);
      } else {
        throw new Error(resData.message);
      }
    } catch (e) {
      alert("保存エラー: " + e.message);
      loader.style.display = "none";
    }
  }

  async function link() {
    const sid = document.getElementById("name-list").value;
    document.getElementById("loading").style.display = "flex";
    try {
      await fetch(`${GAS_URL}?uid=${MY_LINE_ID}&action=link&family_id=${sid}`);
      window.location.reload();
    } catch (e) { alert("Error"); }
  }

  window.onload = init;
</script>
</body>
</html>
